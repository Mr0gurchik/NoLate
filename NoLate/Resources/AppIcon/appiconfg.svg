<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg width="456" height="456" viewBox="0 0 456 456" version="1.1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" xml:space="preserve" xmlns:serif="http://www.serif.com/" style="fill-rule:evenodd;clip-rule:evenodd;stroke-linejoin:round;stroke-miterlimit:2;">
    
    <!-- Внешний круг часов -->
    <circle cx="228" cy="228" r="140" style="fill:none;stroke:#E67E00;stroke-width:24px;" />

    <!-- Засечки времени (12, 3, 6, 9) -->
    <path d="M 228 88 L 228 112 M 228 368 L 228 344 M 368 228 L 344 228 M 88 228 L 112 228" style="fill:none;stroke:#E67E00;stroke-width:16px;stroke-linecap:round;" />

    <!-- Центральная точка -->
    <circle cx="228" cy="228" r="18" style="fill:#E67E00;" />

    <!-- Стрелки часов (на 9:00 и 12:00) -->
    <path d="M 228 228 L 228 140 M 228 228 L 140 228" style="fill:none;stroke:#E67E00;stroke-width:20px;stroke-linecap:round;stroke-linejoin:round;" />

    <!-- Буквы N L в свободном пространстве (правый нижний угол) -->
    <path d="M 245 300 L 245 260 L 270 300 L 270 260 M 285 260 L 285 300 L 310 300" style="fill:none;stroke:#E67E00;stroke-width:12px;stroke-linecap:round;stroke-linejoin:round;" />

</svg>