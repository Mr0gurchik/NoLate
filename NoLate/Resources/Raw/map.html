<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Выбор места</title>

    <!-- Подключаем MapLibre GL JS (современный движок для векторных карт) -->
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />

    <style>
        body, html 
        {
            height: 100%;
            margin: 0;
            padding: 0;
            background: #000;
            font-family: sans-serif;
        }

        #map 
        {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 100%;
        }

        /* Контейнер  поиска */
        .search-container 
        {
            position: absolute;
            top: 15px;
            left: 15px;
            right: 70px;
            z-index: 1000;
            display: flex;
            gap: 8px;
        }

        /* Поле поиска */
        input 
        {
            flex: 1;
            padding: 12px 15px;
            border-radius: 12px;
            border: 1px solid #444;
            background: rgba(30, 30, 30, 0.95);
            color: white;
            outline: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            font-size: 16px;
        }

        /* Кнопка-эконка поиска */
        .btn-icon 
        {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            border: 1px solid #444;
            background: #252525;
            color: white;
            font-size: 20px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Анимация нажатия кнопки */
        .btn-icon:active 
        {
            transform: scale(0.95);
        }

        /* Кнопка GPS (справа сверху) */
        .gps-btn 
        {
            position: absolute;
            top: 15px;
            right: 15px;
            z-index: 1000;
        }

        /* Кнопка подтверждения */
        .select-btn 
        {
            position: absolute;
            bottom: 30px;
            left: 20px;
            right: 20px;
            z-index: 1000;
            background: #FF8C00;
            color: black;
            padding: 16px;
            border: none;
            border-radius: 16px;
            font-weight: bold;
            font-size: 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.6);
            cursor: pointer;
            display: none;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>
    <div class="search-container">
        <input type="text" id="searchInput" placeholder="Поиск места..." onkeydown="if(event.key === 'Enter') searchAddress()">
        <button class="btn-icon" onclick="searchAddress()">🔍</button>
    </div>

    <!-- Кнопка GPS для определения текущего местоположения -->
    <button class="btn-icon gps-btn" onclick="locateUser()">📍</button>

    <div id="map"></div>
    <!-- Кнопка подтверждения -->
    <button id="btnSelect" class="select-btn" onclick="sendLocation()">Подтвердить</button>

    <script>
        // Инициализация MapLibre
        const apiKey = 'Ut2a72DERsffHJluXia2';
        const styleId = '019c7781-7464-763a-805b-e79a9d92c753';

        // Параметры карты
        var map = new maplibregl.Map({
            container: 'map',
            style: `https://api.maptiler.com/maps/${styleId}/style.json?key=${apiKey}`,
            center: [37.6173, 55.7558],
            zoom: 11,
            attributionControl: false
        });

        // Кнопки зума
        map.addControl(new maplibregl.NavigationControl({ showCompass: false }), 'bottom-right');


        var currentMarker = null;
        var currentAddressShort = "Адрес не определен";
        var currentAddressFull = "";

        const urlParams = new URLSearchParams(window.location.search);
        const startLat = urlParams.get('lat');
        const startLon = urlParams.get('lon');

        // Функция при старте
        map.on('load', function ()
        {
            locateUser();
        });

        function locateUserFallback()
        {
            map.flyTo({ center: [37.6173, 55.7558], zoom: 11 });
        }

        map.on('click', function (e)
        {
            handleLocation(e.lngLat.lng, e.lngLat.lat);
        });

        // Функция для выстовления маркера
        function handleLocation(lng, lat)
        {
            // Ставим маркер
            if (currentMarker) currentMarker.setLngLat([lng, lat]);
            else currentMarker = new maplibregl.Marker({ color: "#FF8C00" }).setLngLat([lng, lat]).addTo(map);

            var btn = document.getElementById('btnSelect');
            btn.style.display = 'block';
            btn.innerText = "Загрузка...";

            // Запрашиваем адрес с разбивкой
            fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}&accept-language=ru&addressdetails=1`)
                .then(res => res.json())
                .then(data =>
                {
                    const addr = data.address || {};

                    // Собираем красивую строку: Улица -> Дом -> Город
                    let parts = [];

                    // Улица / Проспект / Площадь
                    if (addr.road) parts.push(addr.road);
                    else if (addr.pedestrian) parts.push(addr.pedestrian);
                    else if (addr.park) parts.push(addr.park);

                    // Номер дома
                    if (addr.house_number) parts.push(addr.house_number);

                    // Город / Деревня / Район
                    if (addr.city) parts.push(addr.city);
                    else if (addr.town) parts.push(addr.town);
                    else if (addr.village) parts.push(addr.village);
                    else if (addr.city_district) parts.push(addr.city_district);

                    // Если вообще ничего нет, берем display_name но коротко
                    if (parts.length === 0)
                    {
                        currentAddressShort = data.display_name.split(',')[0];
                        currentAddressFull = currentAddressShort;
                    }
                    else
                    {
                        currentAddressShort = parts.join(', ');
                        currentAddressFull = parts.join(', ');
                    }

                    btn.innerText = currentAddressShort;
                })

                .catch(() =>
                {
                    currentAddressShort = "Точка на карте";
                    currentAddressFull = `Координаты: ${lat.toFixed(4)}, ${lng.toFixed(4)}`;
                    btn.innerText = "Выбрать точку";
                });
        }


        function searchAddress()
        {
            var query = document.getElementById('searchInput').value;
            if (!query) return;

            query = query
                .replace(/[,.\s]*(д\.?|дом)\s+(\d+)/gi, ' $2')
                .replace(/[,.\s]*д-?с\s+([^\s,]+)/gi, ' $1')
                .replace(/[,.\s]*стр\.?\s+(\d+)/gi, ' стр. $1')
                .replace(/[,.\s]*корп\.?\s+(\d+)/gi, ' корп. $1')
                .replace(/[,.\s]*уч\.?\s+(\d+)/gi, ' уч. $1')
                .replace(/\s+/g, ' ')
                .trim();

            fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&accept-language=ru&limit=3&addressdetails=1`)
                .then(res => res.json())
                .then(data =>
                {

                    // Вылавливание ошибки и поставка маркера
                    if (data && data.length > 0)
                    {
                        var lat = parseFloat(data[0].lat);
                        var lon = parseFloat(data[0].lon);
                        map.flyTo({ center: [lon, lat], zoom: 17 });
                        handleLocation(lon, lat);  // Устанавливаем маркер на найденное место
                    }
                    else
                    {
                        alert("Не найдено: " + query);
                    }
                })
                .catch(err =>
                {
                    console.error("Ошибка поиска:", err);
                    alert("Ошибка сети");
                });
        }

        // отправка в C#
        function sendLocation()
        {
            if (!currentMarker) return;
            const lngLat = currentMarker.getLngLat();
            const encodedAddr = encodeURIComponent(currentAddressFull);
            window.location.href = `invoke://data?lat=${lngLat.lat}&lon=${lngLat.lng}&addr=${encodedAddr}`;
        }

        // функция для определения положения пользователя
        function locateUser()
        {
            if (!navigator.geolocation)
            {
                flyToMoscow();
                return;
            }

            navigator.geolocation.getCurrentPosition(
                position =>
                {
                    const lng = position.coords.longitude;
                    const lat = position.coords.latitude;
                    map.flyTo({ center: [lng, lat], zoom: 16 });
                    handleLocation(lng, lat);
                },
                error =>
                {
                    flyToMoscow();
                },
                {
                    enableHighAccuracy: false,
                    timeout: 10000,
                    maximumAge: 60000
                }
            );
        }

        function flyToMoscow()
        {
            map.flyTo(
            {
                center: [37.6173, 55.7558],
                zoom: 11
            });
        }
    </script>
</body>
</html>
