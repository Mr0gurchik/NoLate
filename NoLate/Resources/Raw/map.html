<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Выбор места</title>

    <!-- Подключаем MapLibre GL JS (современный движок для векторных карт) -->
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />

    <style>
        body, html 
        {
            height: 100%;
            margin: 0;
            padding: 0;
            background: #000;
            font-family: sans-serif;
        }

        #map 
        {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 100%;
        }

        /* Контейнер  поиска */
        .search-container 
        {
            position: absolute;
            top: 15px;
            left: 15px;
            right: 70px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        /* Поле поиска */
        input {
            flex: 1;
            padding: 8px 15px;
            border-radius: 12px;
            border: 1px solid #444;
            background: rgba(30, 30, 30, 0.95);
            color: white;
            outline: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            font-size: 16px;
        }

        /* Кнопка-эконка поиска */
        .btn-icon {
            width: 48px;
            height: 38px;
            border-radius: 12px;
            border: 1px solid #444;
            background: #252525;
            color: white;
            font-size: 20px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Анимация нажатия кнопки */
        .btn-icon:active 
        {
            transform: scale(0.95);
        }

        /* Кнопка GPS (справа сверху) */
        .gps-btn 
        {
            position: absolute;
            top: 15px;
            right: 15px;
            z-index: 1000;
        }

        /* Кнопка подтверждения */
        .select-btn 
        {
            position: absolute;
            bottom: 30px;
            left: 20px;
            right: 20px;
            z-index: 1000;
            background: #FF8C00;
            color: black;
            padding: 16px;
            border: none;
            border-radius: 16px;
            font-weight: bold;
            font-size: 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.6);
            cursor: pointer;
            display: none;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>
    <div class="search-container">
        <!-- Поиск Откуда -->
        <div style="display: flex; gap: 8px;">
            <input type="text" id="searchInputFrom" placeholder="Откуда" onkeydown="if(event.key === 'Enter') { searchAddresses(); this.blur(); }">
            <button class="btn-icon" onclick="searchAddresses()">🔍</button>
        </div>
        <!-- Поиск Куда -->
        <div style="display: flex; gap: 8px;">
            <input type="text" id="searchInputTo" placeholder="Куда" onkeydown="if(event.key === 'Enter') { searchAddresses(); this.blur(); }">
            <div style="width: 48px; flex-shrink: 0;"></div>
        </div>
    </div>

    <!-- Кнопка GPS для определения текущего местоположения -->
    <button class="btn-icon gps-btn" onclick="locateUser()">📍</button>

    <div id="map"></div>
    <!-- Кнопка подтверждения -->
    <button id="btnSelect" class="select-btn" onclick="sendLocation()">Подтвердить</button>

    <script>
        // Инициализация MapLibre
        const apiKey = 'Ut2a72DERsffHJluXia2';
        const styleId = '019c7781-7464-763a-805b-e79a9d92c753';

        // Параметры карты
        var map = new maplibregl.Map(
        {
            container: 'map',
            style: `https://api.maptiler.com/maps/${styleId}/style.json?key=${apiKey}`,
            center: [37.6173, 55.7558],
            zoom: 11,
            attributionControl: false
        });


        var markerFrom = null;
        var markerTo = null;
        var coordsFrom = null;
        var coordsTo = null;
        var addressFrom = "Моя позиция";
        var addressTo = "Адрес не определен";

        const urlParams = new URLSearchParams(window.location.search);
        const startLat = urlParams.get('lat');
        const startLon = urlParams.get('lon');

        function fetchAddress(lng, lat, callback)
        {
            fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}&accept-language=ru&addressdetails=1`)
                .then(res => res.json())
                .then(data =>
                {
                    const addr = data.address || {};
                    let parts = [];
                    if (addr.road) parts.push(addr.road);
                    else if (addr.pedestrian) parts.push(addr.pedestrian);
                    else if (addr.park) parts.push(addr.park);
                    if (addr.house_number) parts.push(addr.house_number);
                    if (addr.city) parts.push(addr.city);
                    else if (addr.town) parts.push(addr.town);
                    else if (addr.village) parts.push(addr.village);
                    else if (addr.city_district) parts.push(addr.city_district);

                    let result = parts.length > 0 ? parts.join(', ') : (data.display_name ? data.display_name.split(',')[0] : "Точка на карте");
                    callback(result);
                }) .catch(() => callback(`Координаты: ${lat.toFixed(4)}, ${lng.toFixed(4)}`));
        }

        // Функция при старте
        map.on('load', function ()
        {
            locateUser();
        });

        function locateUserFallback()
        {
            map.flyTo({ center: [37.6173, 55.7558], zoom: 11 });
        }

        map.on('click', function (e)
        {
            handleLocation(e.lngLat.lng, e.lngLat.lat);
        });

        // Функция для установки точки Откуда
        function setFromLocation(lng, lat, fromSearchText = null)
        {
            coordsFrom = { lng, lat };
            if (markerFrom) markerFrom.setLngLat([lng, lat]);
            else markerFrom = new maplibregl.Marker({ color: "#301212" }).setLngLat([lng, lat]).addTo(map);

            if (fromSearchText)
            {
                addressFrom = fromSearchText;
            }
            else
            {
                document.getElementById('searchInputFrom').value = "Определение адреса...";
                fetchAddress(lng, lat, (addr) =>
                {
                    addressFrom = addr;
                    document.getElementById('searchInputFrom').value = addr;
                });
            }
        }

        // Установка точки Куда
        function handleLocation(lng, lat, fromSearchText = null)
        {
            coordsTo = { lng, lat };
            if (markerTo) markerTo.setLngLat([lng, lat]);
            else markerTo = new maplibregl.Marker({ color: "#FF8C00" }).setLngLat([lng, lat]).addTo(map);

            var btn = document.getElementById('btnSelect');
            btn.style.display = 'block';

            if (fromSearchText)
            {
                addressTo = fromSearchText;
                btn.innerText = addressTo;
            }
            else
            {
                btn.innerText = "Загрузка...";
                document.getElementById('searchInputTo').value = "Определение адреса...";
                fetchAddress(lng, lat, (addr) =>
                {
                    addressTo = addr;
                    document.getElementById('searchInputTo').value = addr;
                    btn.innerText = addr;
                });
            }
        }

        // Функция поиска адреса
        function geocodeAddress(query)
        {
            if (!query) return Promise.resolve(null);
            var cleanQuery = query
                .replace(/[,.\s]*(д\.?|дом)\s+(\d+)/gi, ' $2')
                .replace(/[,.\s]*д-?с\s+([^\s,]+)/gi, ' $1')
                .replace(/[,.\s]*стр\.?\s+(\d+)/gi, ' стр. $1')
                .replace(/[,.\s]*корп\.?\s+(\d+)/gi, ' корп. $1')
                .replace(/[,.\s]*уч\.?\s+(\d+)/gi, ' уч. $1')
                .replace(/\s+/g, ' ')
                .trim();

            return fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(cleanQuery)}&accept-language=ru&limit=3&addressdetails=1`)
                .then(res => res.json())
                .then(data =>
                {
                    if (data && data.length > 0)
                    {
                        return { lat: parseFloat(data[0].lat), lon: parseFloat(data[0].lon) };
                    }
                    return null;
                })
                .catch(err =>
                {
                    console.error("Ошибка геокодинга:", err);
                    return null;
                });
        }

        // Главная функция поиска места
        async function searchAddresses() {
            var inputFrom = document.getElementById('searchInputFrom').value;
            var inputTo = document.getElementById('searchInputTo').value;
            var foundTo = false;

            // Ищем Откуда
            if (inputFrom && inputFrom !== addressFrom) {
                const coordsFromLoc = await geocodeAddress(inputFrom);
                if (coordsFromLoc) {
                    setFromLocation(coordsFromLoc.lon, coordsFromLoc.lat, inputFrom);
                }
            }

            // Ищем Куда
            if (inputTo && inputTo !== addressTo) {
                const coordsToLoc = await geocodeAddress(inputTo);
                if (coordsToLoc) {
                    handleLocation(coordsToLoc.lon, coordsToLoc.lat, inputTo);
                    map.flyTo({ center: [coordsToLoc.lon, coordsToLoc.lat], zoom: 17 });
                    foundTo = true;
                } else {
                    alert("Не найдено: " + inputTo);
                }
            }

            if (!foundTo && inputFrom && inputFrom !== addressFrom) {
                if (coordsFrom) {
                    map.flyTo({ center: [coordsFrom.lng, coordsFrom.lat], zoom: 17 });
                }
            }
        }

        // отправка в C#
        function sendLocation()
        {
            if (!coordsTo) return;
            let url = `invoke://data?toLat=${coordsTo.lat}&toLon=${coordsTo.lng}&toAddr=${encodeURIComponent(addressTo)}`;
            if (coordsFrom)
            {
                url += `&fromLat=${coordsFrom.lat}&fromLon=${coordsFrom.lng}&fromAddr=${encodeURIComponent(addressFrom)}`;
            }
            window.location.href = url;
        }

        // функция для определения положения пользователя
        function locateUser()
        {
            if (!navigator.geolocation)
            {
                flyToMoscow();
                return;
            }

            navigator.geolocation.getCurrentPosition(
                position =>
                {
                    const lng = position.coords.longitude;
                    const lat = position.coords.latitude;
                    map.flyTo({ center: [lng, lat], zoom: 16 });
                    setFromLocation(lng, lat);
                },
                error =>
                {
                    flyToMoscow();
                },
                {
                    enableHighAccuracy: false,
                    timeout: 10000,
                    maximumAge: 60000
                }
            );
        }

        // Функция котороя перемешает позицию карты на цент москвы если позиция пользователя не найдена
        function flyToMoscow()
        {
            map.flyTo(
            {
                center: [37.6173, 55.7558],
                zoom: 11
            });
        }
    </script>
</body>
</html>
